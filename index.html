async function fetchWithRetry(url, options, maxRetries = 3) {
  for (let i = 0; i < maxRetries; i++) {
    let res;
    try { res = await fetch(url, options); }
    catch(e) {
      if (i < maxRetries - 1) {
        const wait = (i + 1) * 3000;
        stEl.textContent = `网络错误，${wait/1000}秒后自动重试（${i+1}/${maxRetries}）…`;
        await new Promise(r => setTimeout(r, wait)); continue;
      }
      throw e;
    }
    if (res.ok) return res;
    const errData = await res.json().catch(() => ({}));
    const msg = errData.error?.message || '';
    const isOverload = msg.toLowerCase().includes('high demand') || res.status === 503 || res.status === 429;
    if (isOverload && i < maxRetries - 1) {
      const wait = (i + 1) * 4000;
      stEl.textContent = `服务繁忙，${wait/1000}秒后自动重试（${i+1}/${maxRetries}）…`;
      await new Promise(r => setTimeout(r, wait)); continue;
    }
    throw new Error(msg || `请求失败 (${res.status})`);
  }
  throw new Error('多次重试后仍失败，请稍后再试');
}

async function fetchRefImage(productName) {
  const {user, repo} = getGHConfig();
  if (!user || !repo) return null;
  const safeName = productName.replace(/[\/\\:*?"<>|]/g, '_');

  // Public repo: list images via API then fetch via raw URL
  try {
    const listRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images`);
    if (listRes.ok) {
      const files = await listRes.json();
      const safeEscaped = safeName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const matched = files.filter(f => {
        const n = f.name.replace(/\.(jpg|jpeg|png|webp)$/i, '');
        return n === safeName || n.match(new RegExp(`^${safeEscaped}_\\d+$`));
      });
      if (matched.length > 0) {
        const pick = matched[Math.floor(Math.random() * matched.length)];
        const r = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/images/${pick.name}`);
        if (!r.ok) return null;
        const blob = await r.blob();
        return new Promise(res => {
          const reader = new FileReader();
          reader.onload = e => res({ data: e.target.result.split(',')[1], mimeType: blob.type || 'image/jpeg', fileName: pick.name });
          reader.readAsDataURL(blob);
        });
      }
    }
  } catch {}

  // Fallback: try direct raw URL
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/images/${safeName}.jpg`);
    if (!r.ok) return null;
    const blob = await r.blob();
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res({ data: e.target.result.split(',')[1], mimeType: blob.type || 'image/jpeg' });
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

function setMode(el, m) {
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  mode = m;
}

function onImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  imgMime = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeImg() {
  imgB64 = null; imgMime = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-preview').src = '';
}

function addMsg(role, text, typing, imgSrc) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'u' : ''}`;
  const av = document.createElement('div');
  av.className = `av ${role === 'user' ? 'u' : 'ai'}`;
  av.textContent = role === 'user' ? '我' : '大根';
  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  if (typing) {
    const phrases = ["分析你的需求中…","结合豪大根产品特点…","思考最佳文案角度…","提炼核心卖点…","构思文案结构…","优化表达方式…"];
    let phraseIdx = 0;
    bbl.innerHTML = '<div class="typing"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="thinking-text">AI 思考中</div><div class="thinking-step" id="thinking-step">' + phrases[0] + '</div></div>';
    const thinkInterval = setInterval(() => {
      phraseIdx = (phraseIdx + 1) % phrases.length;
      const el = document.getElementById('thinking-step');
      if (el) el.textContent = phrases[phraseIdx];
      else clearInterval(thinkInterval);
    }, 1800);
    wrap._thinkInterval = thinkInterval;
    wrap.id = 'typing-msg';
  } else {
    if (imgSrc) { const img = document.createElement('img'); img.src = imgSrc; img.className = 'msg-img'; bbl.appendChild(img); }
    if (role === 'user') { const t = document.createElement('span'); t.textContent = text; bbl.appendChild(t); }
    else { const d = document.createElement('div'); d.innerHTML = (typeof marked !== 'undefined') ? marked.parse(text) : text.replace(/\n/g, '<br>'); bbl.appendChild(d); }
  }
  wrap.appendChild(av); wrap.appendChild(bbl);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function rmTyping() {
  const t = document.getElementById('typing-msg');
  if (t) { if (t._thinkInterval) clearInterval(t._thinkInterval); t.remove(); }
}

async function generateImage(prompt, refImage, productName) {
  const key = getKey();
  if (!key) { addMsg('ai', '请先填入 Gemini API Key'); return; }
  addMsg('ai', '', true);
  stEl.textContent = refImage
    ? `已找到「${productName}」参考图，AI 正在仿照风格生成（约20秒）…`
    : `图库中暂无此产品图片，AI 正在根据产品名称生成（约20秒）…`;

  try {
    const parts = [];
    if (refImage) {
      parts.push({ inlineData: { mimeType: refImage.mimeType, data: refImage.data } });
      parts.push({ text: `请参考这张图片的风格、光线、构图和色调，生成一张相似但不完全相同的新产品图。要求：${prompt}。保持食品摄影的专业感，画面有食欲感，创意要有变化，不要完全复制原图。图片中不要出现任何文字、标签、logo或水印。` });
    } else {
      parts.push({ text: `生成一张专业食品摄影风格的产品图，产品是：${prompt}。要求：温暖自然光线，干净简洁背景（木板或大理石），画面有食欲感，摆盘精致，专业摄影质感，色调暖橙系。图片中不要出现任何文字、标签、logo或水印，只有食物本身。` });
    }

    const res = await fetchWithRetry(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_IMAGE}:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts }],
          generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
        })
      }
    );

    const data = await res.json();
    rmTyping();
    const resParts = data.candidates?.[0]?.content?.parts || [];
    const imgPart = resParts.find(p => p.inlineData);
    const textPart = resParts.find(p => p.text);

    if (imgPart) {
      const wrap = document.createElement('div'); wrap.className = 'msg';
      const av = document.createElement('div'); av.className = 'av ai'; av.textContent = '大根';
      const bbl = document.createElement('div'); bbl.className = 'bbl';
      const note = document.createElement('p');
      note.style.cssText = 'font-size:11px;color:var(--text-3);margin-bottom:6px;';
      note.textContent = refImage ? `参考图库「${productName}」风格生成` : '图库暂无此产品，AI 自由创作生成';
      bbl.appendChild(note);
      if (textPart && textPart.text && !textPart.text.startsWith('[Image')) {
        const p = document.createElement('p'); p.textContent = textPart.text; bbl.appendChild(p);
      }
      const img = document.createElement('img');
      img.src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
      img.style.cssText = 'max-width:100%;border-radius:10px;margin-top:8px;display:block;';
      const dl = document.createElement('a');
      dl.href = img.src; dl.download = 'haodagen-image.png';
      dl.style.cssText = 'display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);';
      dl.textContent = '⬇️ 下载图片';
      bbl.appendChild(img); bbl.appendChild(dl);
      wrap.appendChild(av); wrap.appendChild(bbl);
      msgsEl.appendChild(wrap); msgsEl.scrollTop = msgsEl.scrollHeight;
    } else {
      addMsg('ai', '图片生成失败，请重试');
    }
    stEl.textContent = '';
  } catch(e) {
    rmTyping();
    addMsg('ai', `配图生成失败：${e.message}`);
    stEl.textContent = '';
  }
}

async function go() {
  const text = inpEl.value.trim();
  if ((!text && !imgB64) || btnEl.disabled) return;
  inpEl.value = '';
  btnEl.disabled = true;

  const displayText = text || '（上传了产品图，请帮我写文案）';
  const previewSrc = imgB64 ? document.getElementById('img-preview').src : null;
  addMsg('user', displayText, false, previewSrc);

  // Smart intent detection: keyword fast path + context awareness
  let wantsImage = mode === 'img';
  let wantsCopy = true;

  if (mode !== 'img') {
    const imgKeywords = ['生成图片','帮我配图','生成配图','来张图','出一张图','生成一张图','配一张图','要图片','生成产品图','重新生成','再来一张','换一张','改一下图','换个角度','换个背景','重新来','再生成'];
    const copyKeywords = ['写','笔记','文案','脚本','标题','正文','朋友圈','抖音','小红书'];

    const hasImgWord = imgKeywords.some(k => displayText.includes(k));
    const hasCopyWord = copyKeywords.some(k => displayText.includes(k));

    // Check if last AI message was an image (context awareness)
    const lastMsgs = msgsEl.querySelectorAll('.msg:not(.u)');
    const lastAiMsg = lastMsgs[lastMsgs.length - 1];
    const lastWasImage = lastAiMsg && lastAiMsg.querySelector('img[style*="border-radius:10px"]');

    if (hasImgWord && !hasCopyWord) {
      wantsImage = true; wantsCopy = false;
    } else if (hasImgWord && hasCopyWord) {
      wantsImage = true; wantsCopy = true;
    } else if (lastWasImage && !hasCopyWord) {
      // Last message was image, user is likely asking for image modification
      const modifyWords = ['少一点','多一点','换','改','再','重','另','不要','加','去掉','更'];
      if (modifyWords.some(k => displayText.includes(k))) {
        wantsImage = true; wantsCopy = false;
      }
    }
  }

  if (wantsImage) {
    stEl.textContent = '正在图库中查找参考图…';
    let refImage = null, matchedProduct = null;
    const allProducts = Object.keys(window._PRODUCT_LIST || {});
    matchedProduct = allProducts.find(p => displayText.includes(p)) || allProducts.find(p => p.includes(displayText.slice(0,4)));
    if (matchedProduct) refImage = await fetchRefImage(matchedProduct);

    if (wantsCopy) {
      const copyPrompt = displayText.replace(/，?(生成图片|帮我配图|生成配图|来张图|出一张图|生成一张图?|配一张图|要图片|生成产品图)/g, '');
      addMsg('ai', '', true);
      stEl.textContent = '正在生成文案…';
      try {
        const copyRes = await fetchWithRetry(
          `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${getKey()}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ systemInstruction: { parts: [{ text: getSYS() }] }, contents: [{ role: 'user', parts: [{ text: `${MODE_PROMPTS[mode]}\n\n用户需求：${copyPrompt}` }] }], generationConfig: { maxOutputTokens: 8000, temperature: 1, thinkingConfig: { thinkingBudget: 2048 } } }) }
        );
        const copyData = await copyRes.json();
        rmTyping();
        const copyReply = copyData.candidates?.[0]?.content?.parts?.filter(p => !p.thought).map(p => p.text).join('') || '';
        if (copyReply) { addMsg('ai', copyReply); hist.push({ role: 'assistant', content: copyReply }); saveSession(displayText, copyReply); }
      } catch(e) { rmTyping(); addMsg('ai', `文案生成失败：${e.message}`); }
    }

    stEl.textContent = '正在生成配图…';
    await generateImage(displayText, refImage, matchedProduct || displayText.slice(0, 10));
    btnEl.disabled = false; inpEl.focus();
    return;
  }

  const parts = [];
  if (imgB64) parts.push({ inlineData: { mimeType: imgMime, data: imgB64 } });
  parts.push({ text: `${MODE_PROMPTS[mode]}\n\n用户需求：${displayText}` });
  removeImg();

  const geminiContents = [];
  for (const m of hist) {
    const role = m.role === 'assistant' ? 'model' : 'user';
    let mParts;
    if (Array.isArray(m.content)) {
      mParts = m.content.map(c => {
        if (c.type === 'text') return { text: c.text };
        if (c.type === 'image') return { inlineData: { mimeType: c.source?.media_type, data: c.source?.data } };
        return { text: '' };
      }).filter(p => p.text !== '' || p.inlineData);
    } else { mParts = [{ text: String(m.content || '') }]; }
    if (mParts.length > 0) geminiContents.push({ role, parts: mParts });
  }

  hist.push({ role: 'user', content: parts.map(p => p.text ? { type: 'text', text: p.text } : { type: 'image', source: { type: 'base64', media_type: p.inlineData?.mimeType, data: p.inlineData?.data } }) });
  addMsg('ai', '', true);
  stEl.textContent = '正在生成文案，请稍候…';

  try {
    const res = await fetchWithRetry(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${getKey()}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ systemInstruction: { parts: [{ text: getSYS() }] }, contents: [...geminiContents, { role: 'user', parts }], generationConfig: { maxOutputTokens: 8000, temperature: 1, thinkingConfig: { thinkingBudget: 2048 } } }) }
    );
    const data = await res.json();
    rmTyping();
    const allParts = data.candidates?.[0]?.content?.parts || [];
    const thinkingText = allParts.filter(p => p.thought === true).map(p => p.text).join('').trim();
    const replyText = allParts.filter(p => !p.thought).map(p => p.text).join('').trim() || '没有生成内容，请重试';

    if (thinkingText) {
      const thinkWrap = document.createElement('div'); thinkWrap.className = 'msg';
      const thinkAv = document.createElement('div'); thinkAv.className = 'av ai'; thinkAv.textContent = '大根';
      const thinkBbl = document.createElement('div'); thinkBbl.className = 'think-bubble';
      thinkBbl.innerHTML = `<div class="think-header">思考过程</div>${(typeof marked !== 'undefined') ? marked.parse(thinkingText) : thinkingText.replace(/\n/g,'<br>')}`;
      thinkWrap.appendChild(thinkAv); thinkWrap.appendChild(thinkBbl);
      msgsEl.appendChild(thinkWrap); msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    addMsg('ai', replyText);
    hist.push({ role: 'assistant', content: replyText });
    stEl.textContent = '';
    saveSession(displayText, replyText);
  } catch (err) {
    rmTyping();
    const d = document.createElement('div'); d.className = 'msg';
    const av = document.createElement('div'); av.className = 'av ai'; av.textContent = '大根';
    const b = document.createElement('div'); b.className = 'bbl err-bbl';
    b.textContent = `出错了：${err.message}`;
    d.appendChild(av); d.appendChild(b);
    msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    stEl.textContent = '';
  }
  btnEl.disabled = false; inpEl.focus();
}

function hk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); } }

function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('hdg_sessions') || '[]'); } catch { sessions = []; }
  renderHist();
}
function saveSessions() { localStorage.setItem('hdg_sessions', JSON.stringify(sessions.slice(0, 50))); }
function saveSession(userMsg, aiReply) {
  if (!curSessionId) {
    curSessionId = Date.now().toString();
    sessions.unshift({ id: curSessionId, title: userMsg.slice(0, 28), date: new Date().toLocaleDateString('zh-CN'), msgs: [] });
  }
  const s = sessions.find(s => s.id === curSessionId);
  if (s) { s.msgs = [...hist]; s.title = userMsg.slice(0, 28); }
  saveSessions(); renderHist();
}
function renderHist() {
  if (!sessions.length) { histEl.innerHTML = '<div class="hist-empty">暂无历史记录</div>'; return; }
  histEl.innerHTML = sessions.map(s => `
    <div class="hist-item ${s.id === curSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <span class="hist-icon">💬</span>
      <div class="hist-info"><div class="hist-title">${s.title || '新对话'}</div><div class="hist-meta">${s.date || ''}</div></div>
      <button class="hist-del" onclick="delSession(event,'${s.id}')">×</button>
    </div>`).join('');
}
function loadSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  curSessionId = id; hist = s.msgs || [];
  msgsEl.innerHTML = '';
  hist.forEach(m => { const text = Array.isArray(m.content) ? m.content.find(c => c.type === 'text')?.text || '' : m.content; addMsg(m.role, text); });
  renderHist();
}
function delSession(e, id) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (curSessionId === id) newChat();
  saveSessions(); renderHist();
}
function newChat() {
  curSessionId = null; hist = []; msgsEl.innerHTML = '';
  addMsg('ai', '新对话开始！选好上方场景，告诉我要推哪款产品 🥩');
  renderHist();
}

const savedKey = localStorage.getItem('gkey');
if (savedKey) { const ki = document.getElementById('gkey'); if(ki) ki.value = savedKey; }
loadSessions();

async function loadProductsFromGitHub() {
  const {user, repo, token} = getGHConfig();
  if (!user || !repo || !token) return;
  try {
    const headers = { Authorization: `token ${token}` };
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/products.json`, { headers });
    if (!r.ok) return;
    const d = await r.json();
    const binary = atob(d.content.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const text = new TextDecoder('utf-8').decode(bytes);
    const data = JSON.parse(text);
    if (Array.isArray(data) && data.length > 0) {
      const lines = data.map(p => p.spec ? `${p.name}｜${p.spec}｜批发价¥${p.price}` : `${p.name}｜批发价¥${p.price}`);
      window._DYNAMIC_PRODUCTS = lines.join('\n');
      window._PRODUCT_LIST = {};
      data.forEach(p => { window._PRODUCT_LIST[p.name] = p; });
    }
  } catch(e) { console.log('products load error:', e); }
}
