<style>
:root {
  --bg: #F5F0E8;
  --surface: #FFFFFF;
  --surface2: #FAF6F0;
  --border: rgba(180,155,120,0.2);
  --border2: rgba(180,155,120,0.35);
  --accent: #C8561A;
  --accent2: #A84010;
  --accent-light: #FDF0E8;
  --accent-mid: #E8864A;
  --text-1: #1A1208;
  --text-2: #6B5840;
  --text-3: #A89070;
  --user-bg: #F0EAE0;
  --r: 14px;
  --rs: 10px;

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; }

/* Layout */
.sidebar {

}
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Sidebar header */
.sb-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo {
  width: 36px; height: 36px; border-radius: 10px;

}
.logo-text { font-size: 16px; color: #fff; }
.sb-title { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--text-1); font-weight: 600; letter-spacing: 0.02em; }
.sb-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* Sidebar new chat */
.new-chat-btn {
  margin: 12px 12px 0;
  padding: 9px 14px;
  border-radius: var(--rs);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-2);
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  width: calc(100% - 24px);
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
}
.new-chat-btn:hover { background: var(--accent-light); border-color: rgba(232,134,74,0.3); color: var(--accent); }
.new-chat-btn .plus { font-size: 18px; line-height: 1; }

/* History */
.hist-label {
  padding: 14px 16px 6px;
  font-size: 11px; font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hist-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
.hist-list::-webkit-scrollbar { width: 3px; }
.hist-list::-webkit-scrollbar-thumb { background: var(--border); }
.hist-item {
  padding: 9px 10px;
  border-radius: var(--rs);
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 8px;
  transition: background 0.15s;
  position: relative;
}
.hist-item:hover { background: var(--surface2); }
.hist-item.active { background: var(--accent-light); border-left: 2px solid var(--accent); padding-left: 8px; }
.hist-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.hist-info { flex: 1; min-width: 0; }
.hist-title { font-size: 13px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.hist-del {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  opacity: 0; font-size: 14px; color: var(--text-3);
  background: none; border: none; cursor: pointer;
  padding: 2px 4px; border-radius: 4px;
}
.hist-item:hover .hist-del { opacity: 1; }
.hist-del:hover { color: #C0392B; background: #FFF0EE; }
.hist-empty { padding: 16px 10px; font-size: 13px; color: var(--text-3); }

/* Top bar */

.mode-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.mbtn {

.av {

function getGHConfig() {
  return {
    user: localStorage.getItem('gh_user') || '',
    repo: localStorage.getItem('gh_repo') || '',
    token: localStorage.getItem('gh_token') || ''
  };
}

async function fetchRefImage(productName) {
  const {user, repo, token} = getGHConfig();
  if (!user || !repo) return null;
  const safeName = productName.replace(/[\/\\:*?"<>|]/g, '_');

  // Try to get list of all images for this product (productName, productName_1, _2, _3...)
  try {
    const headers = token ? { Authorization: `token ${token}` } : {};
    const listRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images`, { headers });
    if (listRes.ok) {
      const files = await listRes.json();
      // Match all files for this product: exact name or name_N
      const matched = files.filter(f => {
        const n = f.name.replace(/\.jpg$/i, '');
        return n === safeName || n.match(new RegExp(`^${safeName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}_\\d+$`));
      });
      if (matched.length > 0) {
        // Pick a random one
        const pick = matched[Math.floor(Math.random() * matched.length)];
        const url = `https://raw.githubusercontent.com/${user}/${repo}/main/images/${pick.name}`;
        const r = await fetch(url);
        if (!r.ok) return null;
        const blob = await r.blob();
        return new Promise(res => {
          const reader = new FileReader();
          reader.onload = e => res({ data: e.target.result.split(',')[1], mimeType: blob.type || 'image/jpeg', fileName: pick.name });
          reader.readAsDataURL(blob);
        });
      }
    }
  } catch {}

  // Fallback: try direct URL
  try {
    const url = `https://raw.githubusercontent.com/${user}/${repo}/main/images/${safeName}.jpg`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const blob = await r.blob();
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res({ data: e.target.result.split(',')[1], mimeType: blob.type || 'image/jpeg' });
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

// ── Mode ─────────────────────────────────────────────────────────────
function setMode(el, m) {
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  mode = m;
}

// ── Image handling ───────────────────────────────────────────────────
function onImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  imgMime = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeImg() {
  imgB64 = null; imgMime = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-preview').src = '';
}

// ── Messages ──────────────────────────────────────────────────────────
function addMsg(role, text, typing, imgSrc) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'u' : ''}`;
  const av = document.createElement('div');
  av.className = `av ${role === 'user' ? 'u' : 'ai'}`;
  av.textContent = role === 'user' ? '我' : '大根';
  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  if (typing) {
    const phrases = ["分析你的需求中…","结合豪大根产品特点…","思考最佳文案角度…","提炼核心卖点…","构思文案结构…","优化表达方式…"];
    let phraseIdx = 0;
    bbl.innerHTML = '<div class="typing"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="thinking-text">AI 思考中</div><div class="thinking-step" id="thinking-step">' + phrases[0] + '</div></div>';
    const thinkInterval = setInterval(() => {
      phraseIdx = (phraseIdx + 1) % phrases.length;
      const el = document.getElementById('thinking-step');
      if (el) el.textContent = phrases[phraseIdx];
      else clearInterval(thinkInterval);
    }, 1800);
    wrap._thinkInterval = thinkInterval;
    wrap.id = 'typing-msg';
  } else {
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc; img.className = 'msg-img';
      bbl.appendChild(img);
    }
    if (role === 'user') {
      const t = document.createElement('span');
      t.textContent = text;
      bbl.appendChild(t);
    } else {
      const d = document.createElement('div');
      d.innerHTML = (typeof marked !== 'undefined') ? marked.parse(text) : text.replace(/\n/g, '<br>');
      bbl.appendChild(d);
    }
  }
  wrap.appendChild(av); wrap.appendChild(bbl);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function rmTyping() {
  const t = document.getElementById('typing-msg');
  if (t) {
    if (t._thinkInterval) clearInterval(t._thinkInterval);
    t.remove();
  }
}

async function generateImage(prompt, refImage) {
  const key = getKey();
  if (!key) { addMsg('ai', '请先填入 Gemini API Key'); return; }
  addMsg('ai', '', true);
  stEl.textContent = refImage ? '找到参考图，正在生成相似产品图（约15秒）…' : '正在生成图片（约15秒）…';
  try {
    const parts = [];
    if (refImage) {
      parts.push({ inlineData: { mimeType: refImage.mimeType, data: refImage.data } });
      parts.push({ text: `请参考这张图片的风格、光线、构图和色调，生成一张相似但不完全相同的新产品图。要求：${prompt}。保持食品摄影的专业感，画面有食欲感，但图片内容要有创意变化，不要完全复制。图片中不要出现任何文字、标签、logo或水印。` });
    } else {
      parts.push({ text: `生成一张专业食品摄影风格的产品图。要求：${prompt}。风格：温暖光线，干净背景，有食欲感，专业摄影质感。图片中不要出现任何文字、标签、logo或水印，纯产品图。` });
    }
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts }],
        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
      })
    });
    const data = await res.json();
    rmTyping();
    if (!res.ok) throw new Error(data.error?.message || '生成失败');
    const resParts = data.candidates?.[0]?.content?.parts || [];
    const imgPart = resParts.find(p => p.inlineData);
    const textPart = resParts.find(p => p.text);
    if (imgPart) {
      const wrap = document.createElement('div'); wrap.className = 'msg';
      const av = document.createElement('div'); av.className = 'av ai'; av.textContent = '大根';
      const bbl = document.createElement('div'); bbl.className = 'bbl';
      if (textPart) { const p = document.createElement('p'); p.textContent = textPart.text; bbl.appendChild(p); }
      const img = document.createElement('img');
      img.src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
      img.style.cssText = 'max-width:100%;border-radius:10px;margin-top:8px;display:block;';
      const dl = document.createElement('a');
      dl.href = img.src; dl.download = 'haodagen-image.png';
      dl.style.cssText = 'display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);';
      dl.textContent = '⬇️ 下载图片';
      bbl.appendChild(img); bbl.appendChild(dl);
      wrap.appendChild(av); wrap.appendChild(bbl);
      msgsEl.appendChild(wrap); msgsEl.scrollTop = msgsEl.scrollHeight;
    } else {
      addMsg('ai', textPart?.text || '图片生成失败，请重新描述');
    }
    stEl.textContent = '';
  } catch(e) {
    rmTyping();
    addMsg('ai', `生成失败：${e.message}`);
    stEl.textContent = '';
  }
}

async function go() {
  const text = inpEl.value.trim();
  if ((!text && !imgB64) || btnEl.disabled) return;
  inpEl.value = '';
  btnEl.disabled = true;

  const displayText = text || '（上传了产品图，请帮我写文案）';
  const previewSrc = imgB64 ? document.getElementById('img-preview').src : null;
  addMsg('user', displayText, false, previewSrc);

  // Auto-detect image generation request in any mode
  const imgKeywords = ['生成图片', '帮我配图', '生成配图', '来张图', '出一张图', '生成一张', '配一张图', '要图片', '生成产品图'];
  const wantsImage = mode === 'img' || imgKeywords.some(k => displayText.includes(k));

  if (wantsImage) {
    stEl.textContent = '正在图库中查找参考图…';
    let refImage = null;
    const allProducts = Object.keys(window._PRODUCT_LIST || {});
    const matched = allProducts.find(p => displayText.includes(p)) ||
                    allProducts.find(p => p.includes(displayText.slice(0,4)));
    if (matched) {
      refImage = await fetchRefImage(matched);
      if (refImage) stEl.textContent = `找到「${matched}」的参考图，生成中…`;
    }
    // If also wants copywriting, generate text first then image
    const alsoWantsCopy = mode !== 'img' && displayText.length > 10;
    if (alsoWantsCopy) {
      // Generate copy first
      const copyPrompt = displayText.replace(/，?(生成图片|帮我配图|生成配图|来张图|出一张图|生成一张图?|配一张图|要图片|生成产品图)/g, '');
      const cpParts = [{ text: `${MODE_PROMPTS[mode]}

用户需求：${copyPrompt}` }];
      addMsg('ai', '', true);
      stEl.textContent = '正在生成文案…';
      try {
        const copyRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${getKey()}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: SYS }] },
            contents: [{ role: 'user', parts: copyParts }],
            generationConfig: { maxOutputTokens: 8000, temperature: 1, thinkingConfig: { thinkingBudget: 2048 } }
          })
        });
        const copyData = await copyRes.json();
        rmTyping();
        const copyReply = copyData.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '';
        if (copyReply) {
          addMsg('ai', copyReply);
          hist.push({ role: 'assistant', content: copyReply });
          saveSession(displayText, copyReply);
        }
      } catch(e) { rmTyping(); }
    }
    stEl.textContent = '正在生成配图…';
    await generateImage(displayText, refImage);
    btnEl.disabled = false; inpEl.focus();
    return;
  }

  const parts = [];
  if (imgB64) parts.push({ inlineData: { mimeType: imgMime, data: imgB64 } });
  parts.push({ text: `${MODE_PROMPTS[mode]}\n\n用户需求：${displayText}` });
  removeImg();

  // Build conversation history for Gemini (exclude system prompt injections, keep it clean)
  const geminiContents = [];
  for (const m of hist) {
    const role = m.role === 'assistant' ? 'model' : 'user';
    let mParts;
    if (Array.isArray(m.content)) {
      mParts = m.content.map(c => {
        if (c.type === 'text') return { text: c.text };
        if (c.type === 'image') return { inlineData: { mimeType: c.source?.media_type, data: c.source?.data } };
        return { text: '' };
      }).filter(p => p.text !== '' || p.inlineData);
    } else {
      mParts = [{ text: String(m.content || '') }];
    }
    if (mParts.length > 0) geminiContents.push({ role, parts: mParts });
  }

  hist.push({ role: 'user', content: parts.map(p => p.text ? { type: 'text', text: p.text } : { type: 'image', source: { type: 'base64', media_type: p.inlineData?.mimeType, data: p.inlineData?.data } }) });
  addMsg('ai', '', true);
  stEl.textContent = '正在生成文案，请稍候…';

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${getKey()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYS }] },
        contents: [...geminiContents, { role: 'user', parts }],
        generationConfig: { maxOutputTokens: 8000, temperature: 1, thinkingConfig: { thinkingBudget: 2048 } }
      })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `请求失败 (${res.status})`);
    }
    const data = await res.json();
    rmTyping();

    // Extract thinking and reply parts separately
    const allParts = data.candidates?.[0]?.content?.parts || [];
    const thinkingText = allParts.filter(p => p.thought === true).map(p => p.text).join('').trim();
    const replyText = allParts.filter(p => !p.thought).map(p => p.text).join('').trim() || '没有生成内容，请重试';

    // Show thinking bubble if exists
    if (thinkingText) {
      const thinkWrap = document.createElement('div');
      thinkWrap.className = 'msg';
      const thinkAv = document.createElement('div');
      thinkAv.className = 'av ai'; thinkAv.textContent = '大根';
      const thinkBbl = document.createElement('div');
      thinkBbl.className = 'think-bubble';
      thinkBbl.innerHTML = `<div class="think-header">思考过程</div>${(typeof marked !== 'undefined') ? marked.parse(thinkingText) : thinkingText.replace(/\n/g,'<br>')}`;
      thinkWrap.appendChild(thinkAv); thinkWrap.appendChild(thinkBbl);
      msgsEl.appendChild(thinkWrap);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    addMsg('ai', replyText);
    hist.push({ role: 'assistant', content: reply });
    stEl.textContent = '';
    saveSession(displayText, reply);
  } catch (err) {
    rmTyping();
    const d = document.createElement('div'); d.className = 'msg';
    const av = document.createElement('div'); av.className = 'av ai'; av.textContent = '大根';
    const b = document.createElement('div'); b.className = 'bbl err-bbl';
    b.textContent = `出错了：${err.message}`;
    d.appendChild(av); d.appendChild(b);
    msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    stEl.textContent = '';
  }
  btnEl.disabled = false; inpEl.focus();
}

function qs(t) { inpEl.value = t; go(); }
function hk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); } }

// ── Sessions / History ────────────────────────────────────────────────
function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('hdg_sessions') || '[]'); } catch { sessions = []; }
  renderHist();
}

function saveSessions() {
  localStorage.setItem('hdg_sessions', JSON.stringify(sessions.slice(0, 50)));
}

function saveSession(userMsg, aiReply) {
  if (!curSessionId) {
    curSessionId = Date.now().toString();
    sessions.unshift({ id: curSessionId, title: userMsg.slice(0, 28), date: new Date().toLocaleDateString('zh-CN'), msgs: [] });
  }
  const s = sessions.find(s => s.id === curSessionId);
  if (s) { s.msgs = [...hist]; s.title = userMsg.slice(0, 28); }
  saveSessions();
  renderHist();
}

function renderHist() {
  if (!sessions.length) { histEl.innerHTML = '<div class="hist-empty">暂无历史记录</div>'; return; }
  histEl.innerHTML = sessions.map(s => `
    <div class="hist-item ${s.id === curSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <span class="hist-icon">💬</span>
      <div class="hist-info">
        <div class="hist-title">${s.title || '新对话'}</div>
        <div class="hist-meta">${s.date || ''}</div>
      </div>
      <button class="hist-del" onclick="delSession(event,'${s.id}')">×</button>
    </div>`).join('');
}

function loadSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  curSessionId = id;
  hist = s.msgs || [];
  msgsEl.innerHTML = '';
  hist.forEach(m => {
    const text = Array.isArray(m.content) ? m.content.find(c => c.type === 'text')?.text || '' : m.content;
    addMsg(m.role, text);
  });
  renderHist();
}

function delSession(e, id) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (curSessionId === id) newChat();
  saveSessions(); renderHist();
}

function newChat() {
  curSessionId = null; hist = [];
  msgsEl.innerHTML = '';
  addMsg('ai', '新对话开始！选好上方场景，告诉我要推哪款产品 🥩');
  renderHist();
}

if (savedKey) { const ki = document.getElementById('gkey'); if(ki) ki.value = savedKey; }
loadSessions();

// Load products from GitHub if configured
async function loadProductsFromGitHub() {
  const {user, repo, token} = getGHConfig();
  if (!user || !repo || !token) return;
  try {
    const headers = { Authorization: `token ${token}` };
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/products.json`, { headers });
    if (!r.ok) return;
    const d = await r.json();
    const binary = atob(d.content.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const text = new TextDecoder('utf-8').decode(bytes);
    const data = JSON.parse(text);
    if (Array.isArray(data) && data.length > 0) {
      const lines = data.map(p => p.spec ? `${p.name}｜${p.spec}｜批发价¥${p.price}` : `${p.name}｜批发价¥${p.price}`);
      window._DYNAMIC_PRODUCTS = lines.join('\n');
      window._PRODUCT_LIST = {};
      data.forEach(p => { window._PRODUCT_LIST[p.name] = p; });
    }
  } catch(e) { console.log('products load error:', e); }
}
loadProductsFromGitHub();
