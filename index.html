<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豪大根内容助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF7F2;
  --surface: #FFFFFF;
  --border: #E8E2D9;
  --accent: #C8561A;
  --accent-light: #FDF0E8;
  --accent-mid: #E8864A;
  --text-1: #1A1510;
  --text-2: #6B5F52;
  --text-3: #A89C8E;
  --user-bg: #F0EBE4;
  --r: 16px;
  --rs: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; }

/* Layout */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Sidebar header */
.sb-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-text { font-size: 16px; color: #fff; }
.sb-title { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--text-1); font-weight: 600; }
.sb-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* Sidebar new chat */
.new-chat-btn {
  margin: 12px 12px 0;
  padding: 9px 14px;
  border-radius: var(--rs);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-2);
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  width: calc(100% - 24px);
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
}
.new-chat-btn:hover { background: var(--accent-light); border-color: var(--accent-mid); color: var(--accent); }
.new-chat-btn .plus { font-size: 18px; line-height: 1; }

/* History */
.hist-label {
  padding: 14px 16px 6px;
  font-size: 11px; font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hist-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
.hist-list::-webkit-scrollbar { width: 3px; }
.hist-list::-webkit-scrollbar-thumb { background: var(--border); }
.hist-item {
  padding: 9px 10px;
  border-radius: var(--rs);
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 8px;
  transition: background 0.12s;
  position: relative;
}
.hist-item:hover { background: var(--bg); }
.hist-item.active { background: var(--accent-light); }
.hist-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.hist-info { flex: 1; min-width: 0; }
.hist-title { font-size: 13px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.hist-del {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  opacity: 0; font-size: 14px; color: var(--text-3);
  background: none; border: none; cursor: pointer;
  padding: 2px 4px; border-radius: 4px;
}
.hist-item:hover .hist-del { opacity: 1; }
.hist-del:hover { color: #C0392B; background: #FFF0EE; }
.hist-empty { padding: 16px 10px; font-size: 13px; color: var(--text-3); }

/* Top bar */
.topbar {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.mode-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.mbtn {
  padding: 6px 14px; border-radius: 20px;
  font-size: 12.5px; cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text-2); background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; white-space: nowrap;
}
.mbtn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.mbtn:hover:not(.on) { background: var(--accent-light); border-color: var(--accent-mid); color: var(--accent); }

/* Messages */
#msgs {
  flex: 1; overflow-y: auto;
  padding: 20px; display: flex; flex-direction: column; gap: 16px;
}
#msgs::-webkit-scrollbar { width: 4px; }
#msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; gap: 10px; align-items: flex-start; animation: fadein 0.2s ease; }
.msg.u { flex-direction: row-reverse; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; flex-shrink: 0;
}
.av.ai { background: var(--accent); color: #fff; }
.av.u { background: var(--user-bg); color: var(--text-2); }

.bbl {
  max-width: 76%; padding: 12px 16px;
  border-radius: var(--r); font-size: 14px; line-height: 1.75;
  color: var(--text-1); word-break: break-word;
  border: 1px solid var(--border); background: var(--surface);
}
.bbl h3 { font-size: 14px; font-weight: 500; margin: 10px 0 4px; color: var(--text-1); }
.bbl strong { font-weight: 500; color: var(--text-1); }
.bbl p { margin: 6px 0; }
.bbl ul, .bbl ol { padding-left: 18px; margin: 6px 0; }
.bbl li { margin: 3px 0; }
.bbl hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.msg.u .bbl { background: var(--user-bg); border-color: transparent; }
.msg-img { max-width: 200px; border-radius: 10px; margin-top: 8px; display: block; border: 1px solid var(--border); }

/* Typing */
.typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mid); animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* Input area */
.input-wrap { border-top: 1px solid var(--border); padding: 12px 16px; background: var(--surface); flex-shrink: 0; }
.quick-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.tag {
  padding: 4px 11px; border-radius: 20px;
  font-size: 12px; cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text-2); background: var(--bg);
  font-family: 'DM Sans', sans-serif; transition: all 0.12s;
}
.tag:hover { background: var(--accent-light); border-color: var(--accent-mid); color: var(--accent); }

.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-left { flex: 1; display: flex; flex-direction: column; gap: 6px; }

/* Image preview */
#img-preview-wrap { display: none; position: relative; width: fit-content; }
#img-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; }
#img-remove {
  position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #C0392B; color: #fff;
  border: none; cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}

.textarea-row { display: flex; gap: 6px; align-items: flex-end; }
textarea {
  flex: 1; resize: none; height: 60px;
  font-size: 14px; padding: 10px 14px;
  border-radius: var(--rs); border: 1px solid var(--border);
  background: var(--bg); color: var(--text-1);
  font-family: 'DM Sans', sans-serif; line-height: 1.5; outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--accent-mid); }
textarea::placeholder { color: var(--text-3); }

/* Upload button */
.upload-btn {
  width: 44px; height: 44px; border-radius: var(--rs);
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.15s; flex-shrink: 0;
}
.upload-btn:hover { background: var(--accent-light); border-color: var(--accent-mid); color: var(--accent); }

/* Send button */
#send-btn {
  height: 60px; padding: 0 20px;
  border-radius: var(--rs); border: none;
  background: var(--accent); color: #fff;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
}
#send-btn:hover { background: #B04415; }
#send-btn:disabled { opacity: 0.45; cursor: default; }

#status-bar { font-size: 12px; color: var(--text-3); text-align: right; padding: 6px 0 0; min-height: 20px; }

.err-bbl { border-color: #FFCDD2 !important; background: #FFF5F5 !important; color: #B71C1C !important; }

@media (max-width: 640px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sb-header">
    <div class="logo"><span class="logo-text">🥩</span></div>
    <div>
      <div class="sb-title">豪大根助手</div>
      <div class="sb-sub">内容创作 Agent</div>
    </div>
  </div>
  <div style="margin:8px 12px 0;padding:8px 10px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border);">
    <div style="font-size:11px;color:var(--text-3);margin-bottom:4px;">Gemini API Key</div>
    <input type="password" id="gkey" placeholder="AIza..." style="width:100%;border:none;background:transparent;font-size:12px;color:var(--text-1);outline:none;" oninput="localStorage.setItem('gkey',this.value)" />
  </div>
  <button class="new-chat-btn" onclick="newChat()">
    <span class="plus">+</span> 新建对话
  </button>
  <div class="hist-label">历史记录</div>
  <div class="hist-list" id="hist-list">
    <div class="hist-empty">暂无历史记录</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Top bar -->
  <div class="topbar">
    <div class="mode-bar">
      <button class="mbtn on" onclick="setMode(this,'xhs')">📕 小红书</button>
      <button class="mbtn" onclick="setMode(this,'dy')">🎬 抖音脚本</button>
      <button class="mbtn" onclick="setMode(this,'pyq')">💬 朋友圈</button>
      <button class="mbtn" onclick="setMode(this,'title')">🔥 爆款标题</button>
      <button class="mbtn" onclick="setMode(this,'b2b')">🤝 B端招商</button>
      <button class="mbtn" onclick="setMode(this,'free')">✏️ 自由创作</button>
    </div>
  </div>

  <!-- Messages -->
  <div id="msgs"></div>

  <!-- Input -->
  <div class="input-wrap">
    <div class="quick-tags">
      <span class="tag" onclick="qs('帮我为豪大根地道肠写3个爆款小红书标题')">地道肠爆款标题</span>
      <span class="tag" onclick="qs('写一段吸引餐饮老板的B端招商朋友圈，突出豪大根供应链优势')">B端招商朋友圈</span>
      <span class="tag" onclick="qs('写一个抖音脚本推豪大根德式香肠，目标让餐饮老板来拿货')">德式香肠脚本</span>
      <span class="tag" onclick="qs('写一篇豪大根台式士林大香肠的小红书种草文案')">士林香肠种草</span>
      <span class="tag" onclick="qs('写3个版本的豪大根日式芝士猪排朋友圈文案')">芝士猪排朋友圈</span>
    </div>
    <div class="input-row">
      <div class="input-left">
        <div id="img-preview-wrap">
          <img id="img-preview" src="" alt="预览"/>
          <button id="img-remove" onclick="removeImg()">×</button>
        </div>
        <div class="textarea-row">
          <textarea id="inp" placeholder="选好场景，告诉我要推哪款产品，或上传产品图…" onkeydown="hk(event)"></textarea>
          <button class="upload-btn" onclick="document.getElementById('file-inp').click()" title="上传产品图片">📷</button>
          <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="onImg(event)"/>
        </div>
      </div>
      <button id="send-btn" onclick="go()">发送</button>
    </div>
    <div id="status-bar"></div>
  </div>
</div>

<script>
const msgsEl = document.getElementById('msgs');
const inpEl  = document.getElementById('inp');
const btnEl  = document.getElementById('send-btn');
const stEl   = document.getElementById('status-bar');
const histEl = document.getElementById('hist-list');

function getKey() { return localStorage.getItem('gkey') || ''; }
let mode = 'xhs';
let hist = [];          // current conversation
let imgB64 = null;      // current image base64
let imgMime = null;
let sessions = [];      // all saved sessions
let curSessionId = null;

// ── Products & prompts ──────────────────────────────────────────────
const PRODUCTS = `香肠：地道肠(50/60/70/80g原味&胡椒)、德式香肠(黑椒/烟熏/原味)、台式香肠(原味/蒜味/麻辣/墨鱼汁/玉米/海苔/高粱酒/飞鱼卵)、韩式生鲜肠、老长沙、士林大香肠、骨付香肠、图林根、法兰克福、慕尼黑白肠、粽香肉肠
海鲜：墨鱼丸/墨鱼爆蛋/墨汁鱼肠/章鱼丸/章鱼肠/花枝丸/虾卷/釜山鱼糕/甜不辣
猪肉：日式厚切猪排(芝士1.2kg/原味1.3kg)、松板肉、猪颈肉、叉烧、糯米肉肠
调料：辣椒碎(100/200/500g)、撒料
设备：烤肠机、1/3/5孔底座`;

const MODE_PROMPTS = {
  xhs:   `【小红书种草模式】标题含数字+emoji+痛点/悬念；开头3行要有钩子；正文有场景感。\n输出：① 3个标题版本（注明技巧）② 1篇完整正文300字内 ③ 引导私信/评论互动结尾`,
  dy:    `【抖音脚本模式】前3秒必须有钩子；口播像真人对话，节奏快；结尾明确行动引导。\n输出：① 视频分段结构 ② 完整口播稿 ③ 关键字幕+镜头提示`,
  pyq:   `【微信朋友圈模式】输出3个版本：①真实日常款 ②干货数据款 ③情感共鸣款。每版100字+emoji，结尾引导私信。`,
  title: `【爆款标题模式】给出：小红书标题×3、抖音标题×3、朋友圈首句×3。每个注明技巧，最后推荐最优一个并说明原因。`,
  b2b:   `【B端招商文案模式】目标：餐饮老板/摊主/档口。输出：招商标题+痛点引入+产品方案+合作优势+行动号召。语气真实有逻辑。`,
  free:  `【自由创作模式】根据需求灵活输出，保持豪大根风格：自然真实、有逻辑有依据。`
};

const SYS = `你是豪大根内容助手，专为豪大根品牌新媒体团队服务。
品牌定位：餐饮食材供应链，B2B为餐饮客户提供优质食材，目标通过线上内容引流进入私域成交。
产品目录：${PRODUCTS}
内容原则：自然真实像真人说话；有场景感有逻辑；每次给2-3个版本；所有内容目标：引发兴趣→建立信任→引导私信→私域转化。
如果用户上传了产品图片，请根据图片内容识别产品，结合品牌定位生成对应文案。`;

// ── Mode ─────────────────────────────────────────────────────────────
function setMode(el, m) {
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  mode = m;
}

// ── Image handling ───────────────────────────────────────────────────
function onImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  imgMime = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeImg() {
  imgB64 = null; imgMime = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-preview').src = '';
}

// ── Messages ──────────────────────────────────────────────────────────
function addMsg(role, text, typing, imgSrc) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'u' : ''}`;
  const av = document.createElement('div');
  av.className = `av ${role === 'user' ? 'u' : 'ai'}`;
  av.textContent = role === 'user' ? '我' : '大根';
  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  if (typing) {
    bbl.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    wrap.id = 'typing-msg';
  } else {
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc; img.className = 'msg-img';
      bbl.appendChild(img);
    }
    const t = document.createElement('span');
    t.textContent = text;
    bbl.appendChild(t);
  }
  wrap.appendChild(av); wrap.appendChild(bbl);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function rmTyping() { const t = document.getElementById('typing-msg'); if (t) t.remove(); }

// ── Send ──────────────────────────────────────────────────────────────
async function go() {
  const text = inpEl.value.trim();
  if ((!text && !imgB64) || btnEl.disabled) return;
  inpEl.value = '';
  btnEl.disabled = true;

  const displayText = text || '（上传了产品图，请帮我写文案）';
  const previewSrc = imgB64 ? document.getElementById('img-preview').src : null;
  addMsg('user', displayText, false, previewSrc);

  const parts = [];
  if (imgB64) parts.push({ inlineData: { mimeType: imgMime, data: imgB64 } });
  parts.push({ text: `${MODE_PROMPTS[mode]}\n\n用户需求：${displayText}` });
  removeImg();

  const geminiContents = hist.map(m => {
    if (Array.isArray(m.content)) {
      return { role: m.role === 'assistant' ? 'model' : 'user', parts: m.content.map(c => c.type === 'text' ? { text: c.text } : { inlineData: { mimeType: c.source?.media_type, data: c.source?.data } }) };
    }
    return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
  });

  hist.push({ role: 'user', content: parts.map(p => p.text ? { type: 'text', text: p.text } : { type: 'image', source: { type: 'base64', media_type: p.inlineData?.mimeType, data: p.inlineData?.data } }) });
  addMsg('ai', '', true);
  stEl.textContent = '正在生成文案，请稍候…';

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${getKey()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYS }] },
        contents: [...geminiContents, { role: 'user', parts }],
        generationConfig: { maxOutputTokens: 1200, temperature: 0.9 }
      })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `请求失败 (${res.status})`);
    }
    const data = await res.json();
    rmTyping();
    const reply = data.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '没有生成内容，请重试';
    addMsg('ai', reply);
    hist.push({ role: 'assistant', content: reply });
    stEl.textContent = '';
    saveSession(displayText, reply);
  } catch (err) {
    rmTyping();
    const d = document.createElement('div'); d.className = 'msg';
    const av = document.createElement('div'); av.className = 'av ai'; av.textContent = '大根';
    const b = document.createElement('div'); b.className = 'bbl err-bbl';
    b.textContent = `出错了：${err.message}`;
    d.appendChild(av); d.appendChild(b);
    msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    stEl.textContent = '';
  }
  btnEl.disabled = false; inpEl.focus();
}

function qs(t) { inpEl.value = t; go(); }
function hk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); } }

// ── Sessions / History ────────────────────────────────────────────────
function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('hdg_sessions') || '[]'); } catch { sessions = []; }
  renderHist();
}

function saveSessions() {
  localStorage.setItem('hdg_sessions', JSON.stringify(sessions.slice(0, 50)));
}

function saveSession(userMsg, aiReply) {
  if (!curSessionId) {
    curSessionId = Date.now().toString();
    sessions.unshift({ id: curSessionId, title: userMsg.slice(0, 28), date: new Date().toLocaleDateString('zh-CN'), msgs: [] });
  }
  const s = sessions.find(s => s.id === curSessionId);
  if (s) { s.msgs = [...hist]; s.title = userMsg.slice(0, 28); }
  saveSessions();
  renderHist();
}

function renderHist() {
  if (!sessions.length) { histEl.innerHTML = '<div class="hist-empty">暂无历史记录</div>'; return; }
  histEl.innerHTML = sessions.map(s => `
    <div class="hist-item ${s.id === curSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <span class="hist-icon">💬</span>
      <div class="hist-info">
        <div class="hist-title">${s.title || '新对话'}</div>
        <div class="hist-meta">${s.date || ''}</div>
      </div>
      <button class="hist-del" onclick="delSession(event,'${s.id}')">×</button>
    </div>`).join('');
}

function loadSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  curSessionId = id;
  hist = s.msgs || [];
  msgsEl.innerHTML = '';
  hist.forEach(m => {
    const text = Array.isArray(m.content) ? m.content.find(c => c.type === 'text')?.text || '' : m.content;
    addMsg(m.role, text);
  });
  renderHist();
}

function delSession(e, id) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (curSessionId === id) newChat();
  saveSessions(); renderHist();
}

function newChat() {
  curSessionId = null; hist = [];
  msgsEl.innerHTML = '';
  addMsg('ai', '新对话开始！选好上方场景，告诉我要推哪款产品 🥩');
  renderHist();
}
