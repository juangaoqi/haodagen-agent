<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豪大根图库管理</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF7F2;--surface:#fff;--border:#E8E2D9;--accent:#C8561A;--accent-light:#FDF0E8;--text-1:#1A1510;--text-2:#6B5F52;--text-3:#A89C8E;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);padding:24px 16px;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px}
h1{font-size:18px;font-weight:500;color:var(--text-1);margin-bottom:4px}
.sub{font-size:13px;color:var(--text-3)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:500;color:var(--text-2)}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-1);background:var(--bg);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn:hover{background:#B04415}
.btn:disabled{opacity:.4;cursor:default}
.btn-sec{background:var(--bg);border:1px solid var(--border);color:var(--text-2)}
.btn-sec:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px}
.img-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
.img-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.img-label{padding:6px 8px;font-size:11px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid var(--border)}
.img-del{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.img-item:hover .img-del{opacity:1}
.toast{position:fixed;bottom:24px;right:24px;background:#1A1510;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:var(--accent-light)}
.upload-area p{font-size:14px;color:var(--text-3);margin-top:8px}
.upload-area .icon{font-size:32px}
.preview-wrap{display:none;margin-top:12px;text-align:center}
.preview-wrap img{max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border)}
.status-bar{font-size:12px;color:var(--text-3);margin-top:8px;min-height:18px}
.row{display:flex;gap:10px;align-items:flex-end}
.row .field{flex:1;margin-bottom:0}
.count-badge{display:inline-block;padding:2px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:500;margin-left:8px}
.img-cat-bar{padding:4px 6px;border-top:1px solid var(--border);display:flex;align-items:center;gap:4px;}
.img-cat-bar select{flex:1;border:none;background:transparent;font-size:11px;color:var(--text-2);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.img-cat-bar button{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--accent-light);color:var(--accent);cursor:pointer;white-space:nowrap;}
.img-cat-bar button:hover{background:var(--accent);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>豪大根图库管理 <span class="count-badge" id="count-badge">0 张</span></h1>
    <p class="sub">上传产品实拍图、摆盘图，AI 生成配图时自动参考</p>
  </div>

  <!-- GitHub 配置 -->
  <div class="card">
    <h1 style="font-size:15px;margin-bottom:12px">GitHub 配置</h1>
    <div class="row">
      <div class="field">
        <label>GitHub 用户名</label>
        <input type="text" id="gh-user" placeholder="例：juangaoqi" />
      </div>
      <div class="field">
        <label>仓库名</label>
        <input type="text" id="gh-repo" placeholder="例：haodagen-agent" />
      </div>
    </div>
    <div class="field" style="margin-top:10px">
      <label>GitHub Token（需要 repo 权限）</label>
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-sec" onclick="saveConfig()">保存配置</button>
      <button class="btn btn-sec" onclick="testConfig()">测试连接</button>
    </div>
    <p class="status-bar" id="config-status"></p>
  </div>

  <!-- 上传图片 -->
  <div class="card">
    <h1 style="font-size:15px;margin-bottom:12px">上传产品图</h1>
    <div class="field">
      <label>选择产品</label>
      <select id="product-select">
        <option value="">-- 选择对应产品 --</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>图片类型</label>
      <select id="img-category">
        <option value="">不分类（通用图）</option>
        <option value="批发">批发图（仓库/整箱/未拆包）</option>
        <option value="生品">生品图（冻品状态）</option>
        <option value="熟品">熟品图（炸好出餐）</option>
      </select>
    </div>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="onDrop(event)">
      <div class="icon">📷</div>
      <p>点击或拖拽上传产品图片</p>
      <p style="font-size:12px;margin-top:4px">支持 JPG、PNG，建议尺寸 800x800 以上</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="onFileSelect(event)">
    <div id="preview-grid" style="display:none;margin-top:12px;display:none;flex-wrap:wrap;gap:8px"></div>
    <p style="font-size:12px;color:var(--text-3);margin-top:6px" id="preview-count"></p>
    <p class="status-bar" id="upload-status"></p>
    <button class="btn" id="upload-btn" onclick="uploadImages()" style="margin-top:10px" disabled>批量上传到图库</button>
  </div>

  <!-- 图库展示 -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h1 style="font-size:15px">图库</h1>
      <button class="btn btn-sec" onclick="loadLibrary()" style="padding:6px 14px;font-size:12px">刷新</button>
    </div>
    <div class="img-grid" id="img-grid">
      <p style="font-size:13px;color:var(--text-3)">配置 GitHub 后点击刷新加载图库</p>
    </div>
  </div>
</div>

  <!-- 产品管理 -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h1 style="font-size:15px">产品管理 <span class="count-badge" id="prod-count-badge">0 个</span></h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sec" onclick="loadProducts()" style="padding:6px 14px;font-size:12px">刷新</button>
        <button class="btn" onclick="showAddProduct()" style="padding:6px 14px;font-size:12px">+ 新增产品</button>
      </div>
    </div>

    <!-- Add/Edit form -->
    <div id="prod-form" style="display:none;background:var(--bg);border-radius:8px;padding:14px;margin-bottom:14px;border:1px solid var(--border)">
      <div class="row">
        <div class="field">
          <label>产品名称</label>
          <input type="text" id="prod-name" placeholder="例：豪大根500g德式香肠" />
        </div>
        <div class="field">
          <label>规格</label>
          <input type="text" id="prod-spec" placeholder="例：500g/10根 20包/件" />
        </div>
        <div class="field" style="max-width:120px">
          <label>批发价（元）</label>
          <input type="number" id="prod-price" placeholder="30" step="0.1" />
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn" onclick="saveProduct()" style="padding:8px 16px;font-size:13px">保存</button>
        <button class="btn btn-sec" onclick="cancelProduct()" style="padding:8px 16px;font-size:13px">取消</button>
      </div>
      <p class="status-bar" id="prod-form-status"></p>
    </div>

    <!-- Search -->
    <input type="text" id="prod-search" placeholder="搜索产品名称…" oninput="filterProducts()" style="width:100%;margin-bottom:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text-1);outline:none">

    <!-- Product list -->
    <div id="prod-list" style="display:flex;flex-direction:column;gap:6px">
      <p style="font-size:13px;color:var(--text-3)">配置 GitHub 后点击刷新加载产品</p>
    </div>
    <p class="status-bar" id="prod-status"></p>
  </div>

<div class="toast" id="toast"></div>

<script>
// Populate dropdown dynamically from products.json
function populateProductSelect(products) {
  const sel = document.getElementById('product-select');
  sel.innerHTML = '<option value="">-- 选择对应产品 --</option>';
  products.forEach(p => {
    const o = document.createElement('option');
    const name = typeof p === 'string' ? p : p.name;
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });
}

async function loadProductsForSelect() {
  const {user, repo, token} = getConfig();
  if (!user || !repo || !token) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/products.json`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!r.ok) return;
    const d = await r.json();
    const binary = atob(d.content.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const text = new TextDecoder('utf-8').decode(bytes);
    const data = JSON.parse(text);
    if (Array.isArray(data) && data.length > 0) {
      populateProductSelect(data);
    }
  } catch(e) { console.log('product select load error:', e); }
}

let fileQueue = []; // [{data, name, type}]

function getConfig() {
  return {
    user: localStorage.getItem('gh_user') || '',
    repo: localStorage.getItem('gh_repo') || '',
    token: localStorage.getItem('gh_token') || ''
  };
}

function saveConfig() {
  localStorage.setItem('gh_user', document.getElementById('gh-user').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
  localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
  showToast('配置已保存');
}

async function testConfig() {
  const {user, repo, token} = getConfig();
  if (!user || !repo || !token) { document.getElementById('config-status').textContent = '请先填写配置'; return; }
  document.getElementById('config-status').textContent = '测试中…';
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}`, { headers: { Authorization: `token ${token}` } });
    if (r.ok) {
      document.getElementById('config-status').textContent = '✅ 连接成功！';
      loadLibrary();
      loadProductsForSelect();
    } else {
      document.getElementById('config-status').textContent = `❌ 失败 (${r.status})，检查 Token 和仓库名`;
    }
  } catch(e) { document.getElementById('config-status').textContent = `❌ ${e.message}`; }
}

function onFileSelect(e) { handleFiles(e.target.files); }
function onDrop(e) { e.preventDefault(); document.getElementById('upload-area').classList.remove('drag'); handleFiles(e.dataTransfer.files); }

function handleFiles(files) {
  if (!files.length) return;
  fileQueue = [];
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';
  grid.style.display = 'flex';
  let loaded = 0;
  Array.from(files).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = ev => {
      fileQueue.push({ data: ev.target.result.split(',')[1], name: file.name, type: file.type });
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border)';
      grid.appendChild(img);
      loaded++;
      if (loaded === files.length) {
        document.getElementById('preview-count').textContent = `已选择 ${files.length} 张图片`;
        document.getElementById('upload-btn').disabled = false;
      }
    };
    reader.readAsDataURL(file);
  });
}

async function uploadImages() {
  const product = document.getElementById('product-select').value;
  if (!product) { showToast('请先选择产品'); return; }
  if (!fileQueue.length) { showToast('请先选择图片'); return; }
  const {user, repo, token} = getConfig();
  if (!token) { showToast('请先配置 GitHub Token'); return; }

  const btn = document.getElementById('upload-btn');
  const status = document.getElementById('upload-status');
  btn.disabled = true;

  const category = document.getElementById('img-category').value;
  const safeName = product.replace(/[\/\\:*?"<>|]/g, '_');
  const catSuffix = category ? '_' + category : '';
  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < fileQueue.length; i++) {
    const file = fileQueue[i];
    // If multiple files, add index suffix
    const numSuffix = fileQueue.length > 1 ? '_' + (i + 1) : '';
    const path = 'images/' + safeName + catSuffix + numSuffix + '.jpg';
    status.textContent = `上传中 ${i + 1}/${fileQueue.length}…`;

    try {
      let sha = '';
      const check = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
        headers: { Authorization: `token ${token}` }
      });
      if (check.ok) { const d = await check.json(); sha = d.sha; }

      const body = { message: '上传图片：' + product + catSuffix + numSuffix, content: file.data };
      if (sha) body.sha = sha;

      const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (r.ok) { successCount++; }
      else { failCount++; }
    } catch(e) { failCount++; }

    // Small delay to avoid rate limiting
    if (i < fileQueue.length - 1) await new Promise(r => setTimeout(r, 500));
  }

  status.textContent = `✅ 上传完成：成功 ${successCount} 张${failCount > 0 ? `，失败 ${failCount} 张` : ''}`;
  showToast(`上传完成！${successCount} 张成功`);
  fileQueue = [];
  document.getElementById('preview-grid').style.display = 'none';
  document.getElementById('preview-grid').innerHTML = '';
  document.getElementById('preview-count').textContent = '';
  document.getElementById('file-input').value = '';
  setTimeout(loadLibrary, 1500);
}

async function loadLibrary() {
  const {user, repo, token} = getConfig();
  if (!user || !repo || !token) return;
  const grid = document.getElementById('img-grid');
  grid.innerHTML = '<p style="font-size:13px;color:var(--text-3)">加载中…</p>';
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!r.ok) { grid.innerHTML = '<p style="font-size:13px;color:var(--text-3)">暂无图片，请先上传</p>'; return; }
    const files = await r.json();
    const imgs = files.filter(f => f.name.match(/\.(jpg|jpeg|png|webp)$/i));
    document.getElementById('count-badge').textContent = `${imgs.length} 张`;
    if (!imgs.length) { grid.innerHTML = '<p style="font-size:13px;color:var(--text-3)">暂无图片</p>'; return; }
    grid.innerHTML = '';
    imgs.forEach(f => {
      const name = f.name.replace(/\.(jpg|jpeg|png|webp)$/i, '');
      const item = document.createElement('div'); item.className = 'img-item';
      const imgEl = document.createElement('img');
      imgEl.alt = name; imgEl.loading = 'lazy';
      imgEl.style.cssText = 'width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0ece4;';
      // Public repo: use raw URL directly, fast and simple
      imgEl.src = `https://raw.githubusercontent.com/${user}/${repo}/main/images/${f.name}?t=${Date.now()}`;
      imgEl.onerror = () => { imgEl.src = f.download_url || ''; };

      // Detect current category from filename
      const curCat = name.includes('_批发') ? '批发' : name.includes('_生品') ? '生品' : name.includes('_熟品') ? '熟品' : '';

      const label = document.createElement('div'); label.className = 'img-label'; label.title = name; label.textContent = name;

      // Category rename bar
      const catBar = document.createElement('div'); catBar.className = 'img-cat-bar';
      const catSel = document.createElement('select');
      catSel.innerHTML = '<option value="">通用图</option><option value="批发">批发图</option><option value="生品">生品图</option><option value="熟品">熟品图</option>';
      catSel.value = curCat;
      const catBtn = document.createElement('button');
      catBtn.textContent = '保存分类';
      catBtn.onclick = () => renameImg(f, name, catSel.value, token, user, repo, item, label);
      catBar.appendChild(catSel); catBar.appendChild(catBtn);

      const delBtn = document.createElement('button'); delBtn.className = 'img-del'; delBtn.title = '删除'; delBtn.textContent = '×';
      delBtn.onclick = () => deleteImg(f.path, f.sha, name);
      item.appendChild(imgEl); item.appendChild(label); item.appendChild(catBar); item.appendChild(delBtn);
      grid.appendChild(item);
    });
  } catch(e) { grid.innerHTML = `<p style="font-size:13px;color:#C0392B">${e.message}</p>`; }
}

async function renameImg(f, currentName, newCat, _t, _u, _r, item, label) {
  const baseName = currentName.replace(/_批发|_生品|_熟品/g, '');
  const ext = f.name.includes('.') ? f.name.split('.').pop() : 'jpg';
  const newName = baseName + (newCat ? '_' + newCat : '') + '.' + ext;

  if (newName === f.name) { showToast('分类未变化'); return; }

  const {user, repo, token} = getConfig();
  if (!token) { showToast('请先配置 GitHub Token'); return; }

  item.style.opacity = '0.5';
  label.textContent = '重命名中…';

  try {
    // Use download_url to get image bytes (works for public repos without token)
    const imgRes = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/images/${f.name}`);
    if (!imgRes.ok) throw new Error('读取图片失败');
    const blob = await imgRes.blob();
    const b64 = await new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });

    // Upload with new name
    const putRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images/${newName}`, {
      method: 'PUT',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '重命名：' + f.name + ' → ' + newName, content: b64 })
    });
    if (!putRes.ok) { const e = await putRes.json(); throw new Error(e.message || '上传失败'); }

    // Delete old file (need sha)
    const shaRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images/${f.name}`, {
      headers: { Authorization: 'token ' + token }
    });
    if (shaRes.ok) {
      const shaData = await shaRes.json();
      await fetch(`https://api.github.com/repos/${user}/${repo}/contents/images/${f.name}`, {
        method: 'DELETE',
        headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '删除旧文件：' + f.name, sha: shaData.sha })
      });
    }

    showToast('已更新：' + newName);
    setTimeout(loadLibrary, 1200);
  } catch(e) {
    item.style.opacity = '1';
    label.textContent = currentName;
    showToast('失败：' + e.message);
  }
}

async function deleteImg(path, sha, name) {
  if (!confirm(`确定删除「${name}」的图片吗？`)) return;
  const {user, repo, token} = getConfig();
  const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
    method: 'DELETE',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `删除图片：${name}`, sha })
  });
  if (r.ok) { showToast('已删除'); loadLibrary(); }
  else showToast('删除失败');
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Product Management ──────────────────────────────────────────────
let allProducts = [];
let editingIndex = -1;
const PRODUCTS_PATH = 'products.json';

async function loadProducts() {
  const {user, repo, token} = getConfig();
  if (!user || !repo || !token) return;
  document.getElementById('prod-status').textContent = '加载中…';
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${PRODUCTS_PATH}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (r.ok) {
      const d = await r.json();
      const binary = atob(d.content.replace(/\n/g, ''));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const text = new TextDecoder('utf-8').decode(bytes);
      allProducts = JSON.parse(text);
    } else {
      // File doesn't exist yet, use default products
      allProducts = DEFAULT_PRODUCTS;
    }
    document.getElementById('prod-count-badge').textContent = `${allProducts.length} 个`;
    document.getElementById('prod-status').textContent = '';
    renderProducts(allProducts);
  } catch(e) {
    allProducts = DEFAULT_PRODUCTS;
    renderProducts(allProducts);
    document.getElementById('prod-status').textContent = '使用默认产品数据';
  }
}

async function saveProductsToGitHub() {
  const {user, repo, token} = getConfig();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(allProducts, null, 2))));
  // Get current SHA if exists
  let sha = '';
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${PRODUCTS_PATH}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch {}

  const body = { message: '更新产品列表', content };
  if (sha) body.sha = sha;

  const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${PRODUCTS_PATH}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.ok;
}

function renderProducts(list) {
  const el = document.getElementById('prod-list');
  if (!list.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text-3)">暂无产品</p>'; return; }
  el.innerHTML = list.map((p, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--text-1);font-weight:500">${p.name}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">${p.spec || '—'} ${p.price ? '· 批发价¥' + p.price : ''}</div>
      </div>
      <button class="btn btn-sec" onclick="editProduct(${i})" style="padding:4px 10px;font-size:12px">编辑</button>
      <button onclick="deleteProduct(${i})" style="padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid #FFCDD2;background:#FFF5F5;color:#C0392B;cursor:pointer">删除</button>
    </div>`).join('');
}

function filterProducts() {
  const q = document.getElementById('prod-search').value.toLowerCase();
  renderProducts(q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts);
}

function showAddProduct() {
  editingIndex = -1;
  document.getElementById('prod-name').value = '';
  document.getElementById('prod-spec').value = '';
  document.getElementById('prod-price').value = '';
  document.getElementById('prod-form').style.display = 'block';
  document.getElementById('prod-form-status').textContent = '';
  document.getElementById('prod-name').focus();
}

function editProduct(i) {
  editingIndex = i;
  const p = allProducts[i];
  document.getElementById('prod-name').value = p.name || '';
  document.getElementById('prod-spec').value = p.spec || '';
  document.getElementById('prod-price').value = p.price || '';
  document.getElementById('prod-form').style.display = 'block';
  document.getElementById('prod-form-status').textContent = '';
  document.getElementById('prod-name').focus();
}

function cancelProduct() {
  document.getElementById('prod-form').style.display = 'none';
  editingIndex = -1;
}

async function saveProduct() {
  const name = document.getElementById('prod-name').value.trim();
  const spec = document.getElementById('prod-spec').value.trim();
  const price = parseFloat(document.getElementById('prod-price').value) || 0;
  if (!name) { document.getElementById('prod-form-status').textContent = '请填写产品名称'; return; }

  const prod = { name, spec, price };
  if (editingIndex >= 0) {
    allProducts[editingIndex] = prod;
  } else {
    allProducts.unshift(prod);
  }

  document.getElementById('prod-form-status').textContent = '保存中…';
  const ok = await saveProductsToGitHub();
  if (ok) {
    document.getElementById('prod-form-status').textContent = '';
    document.getElementById('prod-form').style.display = 'none';
    document.getElementById('prod-count-badge').textContent = `${allProducts.length} 个`;
    renderProducts(allProducts);
    showToast(editingIndex >= 0 ? '已更新' : '已新增');
    editingIndex = -1;
    loadProductsForSelect();
  } else {
    document.getElementById('prod-form-status').textContent = '❌ 保存失败，请检查 Token 权限';
  }
}

async function deleteProduct(i) {
  if (!confirm(`确定删除「${allProducts[i].name}」吗？`)) return;
  allProducts.splice(i, 1);
  const ok = await saveProductsToGitHub();
  if (ok) {
    document.getElementById('prod-count-badge').textContent = `${allProducts.length} 个`;
    renderProducts(allProducts);
    showToast('已删除');
    loadProductsForSelect();
  } else {
    showToast('删除失败');
  }
}

// Default products (fallback)
const DEFAULT_PRODUCTS = [
  {name:"豪大根1.2kg日式芝士猪排（厚切）",spec:"1.2kg/10片/包",price:52},
  {name:"豪大根1.3kg日式猪排（厚切）",spec:"1.3kg/10片/包 6包/件",price:42},
  {name:"豪大根500g德式香肠拼盘",spec:"500g/包 6根/包 20包/件",price:35},
  {name:"豪大根台式士林大香肠",spec:"500g/5根 20包/件",price:25},
  {name:"豪大根10根装50克原味地道肠",spec:"500g/10根 25包/件",price:16},
];

// ── Init ──────────────────────────────────────────────────────────────
window.onload = () => {
  const c = getConfig();
  if (c.user) document.getElementById('gh-user').value = c.user;
  if (c.repo) document.getElementById('gh-repo').value = c.repo;
  if (c.token) {
    document.getElementById('gh-token').value = c.token;
    loadLibrary();
    loadProducts();
    loadProductsForSelect();
  }
};
</script>
